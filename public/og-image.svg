  </defs>
  <rect width="1200" height="630" fill="url(#bg)"/>
  <!-- Border -->
  <rect x="20" y="20" width="1160" height="590" rx="24" fill="none" stroke="url(#accent)" stroke-width="2" opacity="0.3"/>
  <!-- Kanji background -->
  <text x="900" y="480" font-family="serif" font-size="400" fill="rgba(249,115,22,0.04)" text-anchor="middle">忍</text>
  <!-- Logo -->
  <rect x="80" y="200" width="70" height="70" rx="16" fill="url(#accent)"/>
