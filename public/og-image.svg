  <!-- Title -->
  <text x="180" y="228" font-family="Arial, sans-serif" font-size="52" fill="white" font-weight="bold">SatoshiKuza</text>
  <text x="180" y="262" font-family="Arial, sans-serif" font-size="18" fill="#666" letter-spacing="4">SHADOW OF THE CHAIN</text>
  <!-- Tagline -->
