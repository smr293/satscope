  <!-- Features -->
  <text x="80" y="400" font-family="monospace" font-size="18" fill="#06b6d4">⚡ Cycle Models</text>
  <text x="320" y="400" font-family="monospace" font-size="18" fill="#16c784">⚡ Time Machine</text>
  <text x="560" y="400" font-family="monospace" font-size="18" fill="#f97316">⚡ Whale Watch</text>
  <text x="800" y="400" font-family="monospace" font-size="18" fill="#8b5cf6">⚡ DCA Calculator</text>
  <text x="80" y="440" font-family="monospace" font-size="18" fill="#eab308">⚡ On-Chain Metrics</text>
  <text x="320" y="440" font-family="monospace" font-size="18" fill="#ec4899">⚡ Fear &amp; Greed</text>
  <text x="560" y="440" font-family="monospace" font-size="18" fill="#3b82f6">⚡ Funding Rates</text>
  <text x="800" y="440" font-family="monospace" font-size="18" fill="#ef4444">⚡ CycleWatch AI</text>
